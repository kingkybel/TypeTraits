<svg width="1600" height="400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TypeTraits banner">
  <!-- Background: Deep Blue-Gray for Tech/Logic feel -->
  <rect width="1600" height="400" fill="#1B2B34"/>
  
  <!-- Decorative background elements -->
  <circle cx="200" cy="400" r="300" fill="#24333D" fill-opacity="0.5"/>
  <circle cx="1450" cy="50" r="200" fill="#ffffff" fill-opacity="0.05"/>
  
  <!-- Text Content: Neatly Aligned, Clean White/Cyan -->
  <g transform="translate(120, 180)">
    <text font-family="Segoe UI, Arial, sans-serif" font-size="96" font-weight="700" fill="#FFFFFF">TypeTraits</text>
    <text y="70" font-family="Segoe UI, Arial, sans-serif" font-size="36" fill="#66D9EF">Compile-time introspection for C++</text>
  </g>
  
  <!-- Right Side Icon: Centered Vertically -->
  <g transform="translate(1300, 200)">
    <!-- Background Circle: Muted Blue-Gray -->
    <circle r="160" fill="#24333D" stroke="#4F5B66" stroke-width="4"/>
    
    <!-- Trait/Analysis Icon: Magnifying Glass over Braces -->
    <g id="trait-icon">
        <!-- Curly Braces {} to represent code/types -->
        <text x="-60" y="40" font-family="monospace" font-size="120" fill="#66D9EF" font-weight="bold">{ }</text>
        
        <!-- Magnifying Glass -->
        <circle cx="20" cy="-20" r="50" fill="none" stroke="#FFFFFF" stroke-width="12"/>
        <line x1="55" y1="15" x2="90" y2="50" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>
    </g>
  </g>
</svg>
